name: Release

# 推送 v* 标签时触发，构建多平台单二进制并发布到 GitHub Release。
# 关键构建命令与 CI 一致，可用 ./scripts/release.sh 在本地等价验证。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix web ci || npm --prefix web install
          npm --prefix web run build

      - name: Test
        run: go test ./...

      - name: Build cross-platform binaries
        run: |
          VERSION="$(tr -d ' \t\n\r' < VERSION)"
          LDFLAGS="-s -w -X mgate-cloud/internal/version.Version=${VERSION}"
          mkdir -p dist
          build() {
            local goos="$1" goarch="$2" ext="$3"
            local out="dist/mgate-cloud_${goos}_${goarch}${ext}"
            echo "building ${out}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "${LDFLAGS}" -o "${out}" ./cmd/mgate-cloud
          }
          build linux amd64 ""
          build linux arm64 ""
          build windows amd64 ".exe"
          ( cd dist && sha256sum mgate-cloud_* > SHA256SUMS )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            dist/mgate-cloud_*
            dist/SHA256SUMS
