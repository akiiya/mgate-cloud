name: Release

# 发布以 Git tag 为唯一来源：
#   - 推送一个 v* tag（命令行 `git tag v0.1.0 && git push origin v0.1.0`，
#     或 GitHub「Draft a new release」新建 tag）即触发发布。
#   - 版本号 = tag 去掉前缀 v，经 ldflags 注入二进制。
#   - 无 VERSION 文件、无需手改文件；日常构建版本由 git describe 派生。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "要重新构建发布的 tag（如 v0.1.0）"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整历史 + tag
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # 从 tag 解析版本号（去掉前缀 v）。
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build & package (test + frontend + multi-platform archives)
        run: bash ./scripts/release.sh
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      # 发布 Release：发布说明由 GitHub 依据提交/PR 自动生成（无需维护 CHANGELOG）。
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/mgate-cloud_*.tar.gz
            dist/mgate-cloud_*.zip
            dist/SHA256SUMS
