name: CI

# dev 分支推送与所有 PR 运行 CI（不发布）。main 的发布由 release.yml 负责。
on:
  push:
    branches: [dev]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # 前端先构建：go embed 需要 web/dist 存在真实产物。
      - name: Build frontend
        run: |
          npm --prefix web ci || npm --prefix web install
          npm --prefix web run build

      - name: go vet
        run: go vet ./...

      # go test 含 internal/securitycheck：禁止 os/exec / exec.Command / bash -c / sh -c。
      - name: go test
        run: go test ./...

      - name: go build (single binary)
        run: |
          VERSION="$(tr -d ' \t\n\r' < VERSION)"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X mgate-cloud/internal/version.Version=${VERSION}" \
            -o dist/mgate-cloud ./cmd/mgate-cloud
